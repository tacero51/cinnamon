<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミッフィーのスイーツ日記</title>
  <meta name="description" content="食べたスイーツを記録するふわふわ日記">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ふわふわ雲の背景装飾 -->
  <div class="clouds" aria-hidden="true">
    <svg class="cloud cloud-1" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
    <svg class="cloud cloud-2" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
    <svg class="cloud cloud-3" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
  </div>

  <header class="site-header">
    <div class="header-decoration">
      <span class="star">✦</span>
      <span class="star star-small">✧</span>
      <span class="star">✦</span>
    </div>
    <h1 class="site-title">ミッフィーの<br>スイーツ日記</h1>
    <p class="site-subtitle">食べたスイーツのきろく ☁️</p>
  </header>

  <main class="entries-section">
    <div id="entries" class="entries-grid">
      <!-- JS で挿入される -->
    </div>
    <div id="empty-state" class="empty-state" hidden>
      <p>まだスイーツがないよ。<br>「＋」ボタンから ついかしてね！</p>
    </div>
  </main>

  <!-- さいしんに する ボタン -->
  <button id="refresh-btn" class="fab fab-refresh" aria-label="ページをさいしんにする" title="さいしんにする">
    <span>🔄</span>
  </button>

  <!-- 投稿ボタン（FAB） -->
  <button id="open-form" class="fab" aria-label="スイーツを追加">
    <span>＋</span>
  </button>

  <!-- 投稿フォーム（モーダル） -->
  <div id="form-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close="true"></div>
    <div class="modal-panel" role="dialog" aria-labelledby="form-title">
      <button class="modal-close" aria-label="閉じる" data-close="true">×</button>
      <h2 id="form-title">あたらしい スイーツを ついか🍰</h2>

      <form id="entry-form" autocomplete="off">
        <label class="field">
          <span class="field-label">スイーツの なまえ <em>*</em></span>
          <input type="text" name="name" maxlength="50" required placeholder="例: ショートケーキ">
        </label>

        <label class="field">
          <span class="field-label">えもじ（すきな おかしの えもじ）</span>
          <div class="emoji-row" role="radiogroup" aria-label="絵文字">
            <button type="button" class="emoji-btn" data-emoji="🍰">🍰</button>
            <button type="button" class="emoji-btn" data-emoji="🍫">🍫</button>
            <button type="button" class="emoji-btn" data-emoji="🍪">🍪</button>
            <button type="button" class="emoji-btn" data-emoji="🍩">🍩</button>
            <button type="button" class="emoji-btn" data-emoji="🍡">🍡</button>
            <button type="button" class="emoji-btn" data-emoji="🍦">🍦</button>
            <button type="button" class="emoji-btn" data-emoji="🍮">🍮</button>
            <button type="button" class="emoji-btn" data-emoji="🧁">🧁</button>
            <button type="button" class="emoji-btn" data-emoji="🍓">🍓</button>
            <button type="button" class="emoji-btn" data-emoji="🍭">🍭</button>
          </div>
          <input type="hidden" name="emoji" value="🍰">
        </label>

        <label class="field">
          <span class="field-label">どこで たべた？</span>
          <input type="text" name="where" maxlength="50" placeholder="おうち / カフェ / こうえん など">
          <small class="field-hint">学校・お店の名前など、ばしょがわかるものはひかえてね</small>
        </label>

        <label class="field">
          <span class="field-label">かんそう</span>
          <textarea name="comment" maxlength="300" rows="3" placeholder="どんな味だった？"></textarea>
        </label>

        <label class="field">
          <span class="field-label">おほし★</span>
          <div class="rating-row" role="radiogroup" aria-label="評価">
            <button type="button" class="star-btn" data-value="1">★</button>
            <button type="button" class="star-btn" data-value="2">★</button>
            <button type="button" class="star-btn" data-value="3">★</button>
            <button type="button" class="star-btn" data-value="4">★</button>
            <button type="button" class="star-btn" data-value="5">★</button>
          </div>
          <input type="hidden" name="rating" value="0">
        </label>

        <label class="field">
          <span class="field-label">しゃしん（あるなら）</span>
          <input type="file" name="photo" accept="image/*" capture="environment">
          <small class="field-hint">じぶんや おともだちが うつってる しゃしんは のせないでね</small>
        </label>

        <div class="form-actions">
          <button type="button" class="btn-cancel" data-close="true">やめる</button>
          <button type="submit" class="btn-submit">とうこうする</button>
        </div>

        <div id="form-message" class="form-message" hidden></div>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    <p>made with ☁️ by ミッフィー</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
