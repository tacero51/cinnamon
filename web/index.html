<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミッフィーのスイーツ日記</title>
  <meta name="description" content="食べたスイーツを記録するふわふわ日記">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap">
  <link rel="stylesheet" href="styles.css?v=20260517-7">
</head>
<body>
  <!-- ふわふわ雲の背景装飾 -->
  <div class="clouds" aria-hidden="true">
    <svg class="cloud cloud-1" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
    <svg class="cloud cloud-2" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
    <svg class="cloud cloud-3" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 60 Q20 60 20 45 Q20 30 40 30 Q40 15 60 15 Q80 5 100 20 Q130 10 140 30 Q170 30 170 50 Q170 65 145 65 Z" fill="white"/>
    </svg>
  </div>

  <!-- ホーム画面 -->
  <div id="home-view">
    <header class="site-header">
      <div class="header-decoration">
        <span class="star">✦</span>
        <span class="star star-small">✧</span>
        <span class="star">✦</span>
      </div>
      <h1 class="site-title">ミッフィーの<br>スイーツ日記</h1>
      <p class="site-subtitle">食べたスイーツのきろく ☁️</p>
    </header>

    <main class="entries-section">
      <div id="entries" class="entries-grid">
        <!-- JS で挿入される -->
      </div>
      <div id="empty-state" class="empty-state" hidden>
        <p>まだスイーツがないよ。<br>「＋」ボタンから ついかしてね！</p>
      </div>
    </main>

    <!-- さいしんに する ボタン -->
    <button id="refresh-btn" class="fab fab-refresh" aria-label="ページをさいしんにする" title="さいしんにする">
      <span>🔄</span>
    </button>

    <!-- まとめてとうろくボタン -->
    <input type="file" id="bulk-input" accept="image/*" multiple hidden>
    <button id="bulk-btn" class="fab fab-bulk" aria-label="まとめてとうろく" title="しゃしんを まとめてとうろく">
      <span>📷+</span>
    </button>

    <!-- 投稿ボタン（FAB） -->
    <button id="open-form" class="fab" aria-label="スイーツを追加">
      <span>＋</span>
    </button>

    <footer class="site-footer">
      <p>made with ☁️ by ミッフィー</p>
    </footer>
  </div>

  <!-- まとめてとうろくの進捗オーバーレイ -->
  <div id="bulk-progress" class="bulk-progress" hidden>
    <div class="bulk-progress-panel">
      <h3 id="bulk-progress-title">とうろくちゅう...</h3>
      <p id="bulk-progress-text">0 / 0</p>
      <div class="bulk-progress-bar">
        <div id="bulk-progress-fill" class="bulk-progress-fill"></div>
      </div>
      <button id="bulk-close-btn" class="btn-bulk-close" hidden>とじる</button>
    </div>
  </div>

  <!-- 投稿/編集画面 -->
  <div id="post-view" hidden>
    <header class="post-header">
      <button id="back-btn" class="back-btn" aria-label="もどる">← もどる</button>
      <h2 id="form-title">あたらしい きろく</h2>
    </header>

    <main class="post-main">
      <form id="entry-form" autocomplete="off">
        <div class="field">
          <span class="field-label">しゃしん（あるなら）</span>
          <div class="photo-picker">
            <input type="file" id="photo-input" name="photo" accept="image/*" hidden>
            <button type="button" id="photo-pick-btn" class="btn-photo-pick">
              📷 しゃしんを えらぶ
            </button>
            <div id="photo-preview" class="photo-preview" hidden>
              <img id="photo-preview-img" alt="えらんだ しゃしん">
              <button type="button" id="photo-clear-btn" class="btn-photo-clear" aria-label="しゃしんを やめる">×</button>
            </div>
          </div>
          <small class="field-hint">じぶんや おともだちが うつってる しゃしんは のせないでね</small>
        </div>

        <label class="field">
          <span class="field-label">スイーツの なまえ</span>
          <input type="text" name="name" maxlength="50" placeholder="例: ショートケーキ">
        </label>

        <label class="field">
          <span class="field-label">どこで たべた？</span>
          <input type="text" name="where" maxlength="50" placeholder="おうち / カフェ / こうえん など">
          <small class="field-hint">学校・お店の名前など、ばしょがわかるものはひかえてね</small>
        </label>

        <label class="field">
          <span class="field-label">おほし★</span>
          <div class="rating-row" role="radiogroup" aria-label="評価">
            <button type="button" class="star-btn" data-value="1">★</button>
            <button type="button" class="star-btn" data-value="2">★</button>
            <button type="button" class="star-btn" data-value="3">★</button>
            <button type="button" class="star-btn" data-value="4">★</button>
            <button type="button" class="star-btn" data-value="5">★</button>
          </div>
          <input type="hidden" name="rating" value="0">
        </label>

        <label class="field">
          <span class="field-label">かんそう</span>
          <textarea name="comment" maxlength="300" rows="3" placeholder="どんな味だった？"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" class="btn-cancel" data-action="back">やめる</button>
          <button type="submit" class="btn-submit">とうこうする</button>
        </div>

        <div id="form-message" class="form-message" hidden></div>

        <!-- 削除ボタン（編集モードでだけ表示） -->
        <div id="delete-zone" class="delete-zone" hidden>
          <button type="button" id="delete-btn" class="btn-delete">
            🗑️ スイーツのきろくを けす
          </button>
        </div>
      </form>
    </main>
  </div>

  <!-- EXIF抽出ライブラリ（写真から日付・GPS取得） -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/lite.umd.js"></script>
  <script src="app.js?v=20260517-7"></script>
</body>
</html>
